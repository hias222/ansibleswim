- name: serialsw | set vars
  set_fact:
    key_value: serial_data
    serial_base_dir: /opt/colorado/serial
    serial_build_dir: /opt/colorado/build
    pogio_master_file: pigpio-master.zip
    pigpio_base_dir: /opt/colorado/pigpio


