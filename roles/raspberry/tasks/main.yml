- name: "common | install base"
  debug: 
    msg: "install base"

- name: "common | set args"
  set_fact:
    key_value: npm
    npm_download_file: node-v12.18.3-linux-arm64


- name: "common add changeRPIstart"
  include_tasks: changeRPIstart.yml

- name: "common | apt update "
  become: true
  apt:
    update_cache: yes

- name: "common | install packages "
  become: true
  apt:
    pkg:
    - gcc
    - build-essential
    - make
    - cmake
    - unzip
    - python-setuptools 
    - python3-setuptools
    - libssl-dev
    - jpnevulator
    - mosquitto 
    - mosquitto-clients
    - nginx-full

- name: "common | npm | extract {{ npm_download_file }}"
  become: true
  unarchive:
    src: "{{ npm_download_file }}.tar.xz"
    dest: /opt

- name: "common | npm | copy environment"
  become: true
  template:
    src: environment
    dest: /etc/environment

- name: "common | npm | reset ssh connection"
  meta: reset_connection

- name: "common | npm | run node -v"
  shell: node -v
  register: shell_output

- name: "common | check npm"
  debug: 
    msg: "{{shell_output.stdout_lines}}"
